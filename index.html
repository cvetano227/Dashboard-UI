<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard UI</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="dashboard">
      <div class="dashboard-overlay">
        <img src="img/cloud.PNG" alt="cloud" />
      </div>
      <div class="location">
        <i class="bi bi-geo-alt-fill"></i>
        <h3>New York</h3>
      </div>
      <div class="date-time">
        <h2>Tuesday - May 22</h2>
        <h1>7:42<span class="date-time-h1">am</span></h1>
      </div>
      <div class="dashboard-info">
        <div class="info1">
          <p>Feels like : 23 C</p>
          <p>Wind: N 5mph</p>
          <div class="info-savings">
            <p>Sunrise: 05:55AM</p>
            <p>Sunset: 06:35PM</p>
          </div>
        </div>
        <div class="info2">
          <h1>23 C</h1>
          <p>Thunder</p>
        </div>
      </div>
      <div class="days">
        <div class="day">
          <p>TUE</p>
          <img src="/img/raining.png" alt="Raining" />
          <p>30/25</p>
        </div>
        <div class="day">
          <p>WED</p>
          <img src="img/cloudy.png" alt="Cloudy" />
          <p>32/28</p>
        </div>
        <div class="day">
          <p>THU</p>
          <img src="img/sunny.png" alt="Sunny" />
          <p>34/29</p>
        </div>
        <div class="day">
          <p>FRI</p>
          <img src="/img/storming.png" alt="Storming" />
          <p>25/19</p>
        </div>
        <div class="day">
          <p>SAT</p>
          <img src="img/snowing.png" alt="Snowing" />
          <p>35/29</p>
        </div>
      </div>
    </div>
  </body>
</html>
